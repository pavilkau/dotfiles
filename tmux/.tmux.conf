set -ga terminal-overrides ",xterm-256color*:Tc"

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# Gruvbox dark
set -g status-style 'bg=#1d2021 fg=#ebdbb2'
set -g status-right ''
set-window-option -g status-left " #S            "
set-window-option -g status-left-length 50
set-window-option -g status-left-style 'bg=#1d2021 fg=#fe8019'
set -g status-justify left
set -g status-position top

set-window-option -g window-status-format " #I: #W "
set-window-option -g window-status-style 'bg=#1d2021 fg=#a89984'

set-window-option -g window-status-current-format " #I: #W "
set-window-option -g window-status-current-style 'bg=#1d2021 fg=#b8bb26,bold'

bind r source-file ~/.tmux.conf
set -g base-index 1

# Sane scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g mouse on 

# set-window-option -g mode-keys vi
# bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
set -sg escape-time 0

bind -r '|' split-window -h # Split panes horizontal
bind -r '_' split-window -v # Split panes vertically

# only this line might not be enough
set -g default-terminal "xterm-256color"

# Needs this line also to overrides the default color
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
